version: "3"
services:
  postgres:
    container_name: daikoku-oidc-test-postgres
    image: postgres:latest
    networks:
      - basicsetup
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: default
    volumes:
      - ../daikoku/javascript/tests/config/postgres/create_database.sql:/docker-entrypoint-initdb.d/create_database.sql
    ports:
      - 5432:5432
  openldap:
    image: osixia/openldap:latest
    environment:
      LDAP_BASE_DN: "dc=dundermifflin,dc=com"
      LDAP_ORGANISATION: "Dunder Mifflin Organization"
      LDAP_DOMAIN: "dundermifflin.com"
      LDAP_ADMIN_PASSWORD: "adminpassword"
      LDAP_TLS: "false" # deactivate TLS for the LDAP server
    volumes:
      - ../daikoku/javascript/tests/config/ldap/bootstrap.ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom/50-bootstrap.ldif
    networks:
      - basicsetup
    expose:
      - 389
    ports:
      - "389:389" # default port for unsecured LDAP
    command: --copy-service
    restart: unless-stopped

  smtp:
    image: reachfive/fake-smtp-server:latest
    networks:
      - basicsetup
    ports:
      - 1080:1080
      - 1025:1025

  redis:
    image: redis:7.2
    networks:
      - basicsetup
    expose:
      - 6379
    ports:
      - 6379:6379
  otoroshi:
    image: maif/otoroshi:latest
    networks:
      - basicsetup
    environment:
      - OTOROSHI_STORAGE=redis
      - OTOROSHI_REDIS_HOST=redis
      - OTOROSHI_EXPOSED_PORTS_HTTP=8080
      - OTOROSHI_INITIAL_ADMIN_LOGIN=admin@otoroshi.io
      - OTOROSHI_INITIAL_ADMIN_PASSWORD=password
      - OTOROSHI_IMPORT_FROM=/usr/app/otoroshi/imports/otoroshi-state.json
      - OTOROSHI_DOMAIN=oto.tools
    volumes:
      - "../daikoku/javascript/tests/config/otoroshi:/usr/app/otoroshi/imports"
    ports:
      - 8080:8080
    depends_on:
      - redis

networks:
  basicsetup:
    driver: bridge
    ipam:
      driver: default
