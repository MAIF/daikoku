version: "0.5"

# Coverage run for a single suite, selected via the MODE env var (ldap | oidc | local).
# Mirrors process-compose.yaml, but:
#   - the Backend runs instrumented (`sbt coverage run`, NOT ~run) so scoverage records hits;
#   - the Test process runs headless and exits, tearing everything down on completion;
#   - on shutdown the backend gets a SIGTERM so scoverage flushes its measurement files,
#     which the `coverage:e2e:<mode>` mise task then harvests.
#
# Driven by the mise `coverage:e2e:*` tasks — not meant to be launched directly.
processes:
  Postgres:
    command: |
      mise run pg:clean ;
      mise run pg
    readiness_probe:
      exec:
        command: "nc -z localhost 5432 > /dev/null 2> /dev/null"
      initial_delay_seconds: 3
      period_seconds: 5
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 10
    shutdown:
      command: "mise run pg:clean"
  Containers:
    # Wait for Postgres first: both compose files run from dev/ (project "dev") and the
    # oidc compose's oidc-server-mock has no explicit network, so it creates `dev_default`
    # — the same network pg's compose creates. Starting them concurrently races and yields
    # two `dev_default` networks ("network dev_default is ambiguous"). Serializing lets pg
    # create it first and the oidc compose reuse it.
    depends_on:
      Postgres:
        condition: process_healthy
    command: |
      if [[ $MODE = "ldap" ]] ;
      then mise run test:front:ldap:containers ;
      elif [[ $MODE = "oidc" ]] ;
      then mise run test:front:oidc:containers ;
      else mise run dev:containers ;
      fi
    readiness_probe:
      http_get:
        host: otoroshi-api.oto.tools
        scheme: http
        path: "/health"
        port: 8080
      initial_delay_seconds: 2
      period_seconds: 5
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 40
    shutdown:
      command: |
        if [[ $MODE = "ldap" ]] ;
        then mise run test:front:ldap:clean ;
        elif [[ $MODE = "oidc" ]] ;
        then mise run test:front:oidc:clean ;
        else mise run dev:clean ;
        fi
  Backend:
    command: |
      if [[ $MODE = "ldap" ]] ;
      then mise run test:front:ldap:backend:coverage ;
      elif [[ $MODE = "oidc" ]] ;
      then mise run test:front:oidc:backend:coverage ;
      else mise run test:front:local:backend:coverage ;
      fi
    is_tty: true
    # Play dev `run` doesn't die on process-compose's SIGTERM (the signal reaches the
    # `mise run` wrapper, not the sbt/Play grandchild), so exit_on_end would hang on
    # teardown. Kill the sbt/Play process explicitly. Safe: scoverage writes its
    # measurement files continuously during the run, not at exit.
    shutdown:
      command: "pkill -f 'sbt-launch.jar coverage run' || true"
      timeout_seconds: 15
    depends_on:
      Containers:
        condition: process_healthy
    readiness_probe:
      http_get:
        host: localhost
        scheme: http
        path: "/health"
        port: 9000
      initial_delay_seconds: 2
      period_seconds: 5
      timeout_seconds: 5
      success_threshold: 1
      # Play dev mode compiles (instrumented) lazily on first request — keep this generous.
      failure_threshold: 10000
  Frontend:
    command: "mise run dev:front"
    depends_on:
      Containers:
        condition: process_healthy
    readiness_probe:
      http_get:
        host: localhost
        scheme: http
        path: "/health"
        port: 5173
      initial_delay_seconds: 2
      period_seconds: 5
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 40
  Test:
    command: |
      if [[ $MODE = "ldap" ]] ;
      then mise run test:front:ldap:run:coverage ;
      elif [[ $MODE = "oidc" ]] ;
      then mise run test:front:oidc:run:coverage ;
      else mise run test:front:local:run:coverage ;
      fi
    depends_on:
      Backend:
        condition: process_healthy
      Frontend:
        condition: process_healthy
    # NOTE: must be nested under `availability` — a top-level `exit_on_end` is
    # silently ignored, so process-compose never tears down when tests finish.
    availability:
      exit_on_end: true
