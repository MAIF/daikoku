version: "3"
services:
  postgres:
    container_name: daikoku_postgres
    image: postgres:latest
    volumes:
      - ./postgres:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-U", "postgres", "-d", "daikoku_test"]
      interval: 5s
      timeout: 60s
      retries: 10
      start_period: 80s
