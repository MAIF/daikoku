changelog:
  sections:
    - title: "Enhancements"
      emoji: "⭐️"
      labels: ["new", "enhancements"]
    - title: "bug"
      emoji: "🐛"
      labels: ["fix", "bug"]
    - title: "technical"
      emoji: "🔧"
      labels: ["technical"]

  issues:
    exclude:
      labels: ["wontfix", "question", "duplicate", "can't reproduce"]
