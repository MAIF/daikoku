name: Playwright Tests

on:
  # Triggered after build-docker completes (whether or not it actually built)
  workflow_run:
    workflows: ["Build Docker Image"]
    types: [completed]
    branches:
      - '**'

  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: maif/daikoku

jobs:
  test:
    runs-on: ubuntu-latest
    # Skip if triggered by a failed build
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        suite:
          - name: ldap
            compose-file: ./daikoku/javascript/tests/docker-compose.yml
            playwright-config: playwright.config.js
            health-url: http://localhost:13200/health
          - name: oidc
            compose-file: ./daikoku/javascript/tests/docker-compose-openid.yml
            playwright-config: playwright.oidc.config.js
            health-url: http://localhost:13200/health
          - name: perf
            compose-file: ./daikoku/javascript/tests/docker-compose.yml
            playwright-config: playwright.perf.config.js
            health-url: http://localhost:13200/health
    name: "test-${{ matrix.suite.name }} — ${{ github.event.workflow_run.display_title || github.event.head_commit.message }}"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: latest

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Daikoku image
        run: |
          BRANCH=$(echo "${{ github.event.workflow_run.head_branch || github.ref_name }}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${BRANCH}
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${BRANCH} maif/daikoku:latest

      - name: Start environment
        uses: hoverkraft-tech/compose-action@v2.2.0
        with:
          compose-file: ${{ matrix.suite.compose-file }}

      - name: Wait for API to be ready
        run: |
          echo "Waiting for services to be up..."
          until curl --silent --fail ${{ matrix.suite.health-url }}; do
            printf '.'
            sleep 2
          done
          echo "daikoku are ready!"

      - name: Install Playwright
        run: |
          cd ./daikoku/javascript/tests
          npm ci
          npx playwright install --with-deps chromium

      - name: Seed perf data
        if: matrix.suite.name == 'perf'
        run: |
          cd scripts
          npm ci
          node seed-subscriptions-prodlike.mjs
        env:
          PG_HOST: localhost
          PG_PORT: 5442
          PG_DB: daikoku_demo_komainu
          OTOROSHI_URL: http://otoroshi-api.oto.tools:8080

      - name: Run Playwright tests (${{ matrix.suite.name }})
        run: |
          cd ./daikoku/javascript/tests
          if [[ "${{ matrix.suite.name }}" == "perf" ]]; then
            npx playwright test --config ${{ matrix.suite.playwright-config }}
          else
            npx playwright test --config ${{ matrix.suite.playwright-config }} --project chromium
          fi
        env:
          CI: true
          EXPOSED_PORT: 13200
          DAIKOKU_URL: http://localhost:13200
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5442
          POSTGRES_DB: daikoku_demo_komainu
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
