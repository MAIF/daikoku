name: Build Docker Image

on:
  push:
    paths:
      - 'daikoku/app/**'
      - 'daikoku/conf/**'
      - 'daikoku/build.sbt'
      - 'daikoku/project/**'
      - 'daikoku/javascript/src/**'
      - 'daikoku/javascript/package.json'
      - 'daikoku/javascript/package-lock.json'
      - 'daikoku/javascript/tests/**'
      - 'scripts/seed-subscriptions.mjs'
      - '.github/workflows/build-docker.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: maif/daikoku

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if Docker build is needed
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            needs_build:
              - 'daikoku/app/**'
              - 'daikoku/conf/**'
              - 'daikoku/build.sbt'
              - 'daikoku/project/**'
              - 'daikoku/javascript/src/**'
              - 'daikoku/javascript/package.json'
              - 'daikoku/javascript/package-lock.json'
              - '.github/workflows/build-docker.yml'

      - name: Set up Node.js
        if: steps.changes.outputs.needs_build == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@v6
        with:
          node-version: latest

      - name: Set up JDK 21
        if: steps.changes.outputs.needs_build == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: sbt/setup-sbt@v1
        if: steps.changes.outputs.needs_build == 'true' || github.event_name == 'workflow_dispatch'
      - uses: coursier/cache-action@v6
        if: steps.changes.outputs.needs_build == 'true' || github.event_name == 'workflow_dispatch'

      - name: Install JS dependencies and build frontend
        if: steps.changes.outputs.needs_build == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          cd daikoku/javascript
          rm -rf node_modules/
          npm ci
          npm run build
        env:
          NODE_OPTIONS: --max_old_space_size=4096

      - name: Build backend and Docker image
        if: steps.changes.outputs.needs_build == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          cd daikoku
          sbt -Dsbt.color=always -Dsbt.supershell=false ';clean;compile;dist'
          sbt 'docker:publishLocal'

      - name: Log in to GitHub Container Registry
        if: steps.changes.outputs.needs_build == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push image
        if: steps.changes.outputs.needs_build == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          BRANCH=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          docker tag maif/daikoku:latest ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${BRANCH}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${BRANCH}
          if [[ "${{ github.ref_name }}" == "master" ]]; then
            docker tag maif/daikoku:latest ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          fi

      - name: Build skipped
        if: steps.changes.outputs.needs_build == 'false' && github.event_name != 'workflow_dispatch'
        run: echo "No source changes — skipping Docker build, Playwright tests will run with existing image"
