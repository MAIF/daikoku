{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "daikoku.serviceAccountName" . }}
  labels:
    {{- include "daikoku.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# Daikoku does not talk to the Kubernetes API — do not mount a token.
automountServiceAccountToken: false
{{- end }}
