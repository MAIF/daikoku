{{- /*
Secret holding the user-provided secret-bearing init-tenant values (mailer keys,
S3 secret, Otoroshi client secret, OAuth2 client secret, LDAP/Elastic passwords).
Only created when at least one such value is set. Consumed by the Deployment via
an optional `envFrom` secretRef.
*/ -}}
{{- if eq (include "daikoku.initTenant.hasSecrets" .) "true" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "daikoku.fullname" . }}-init-tenant
  labels:
    {{- include "daikoku.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- include "daikoku.initTenant.secretData" . | nindent 2 }}
{{- end }}
