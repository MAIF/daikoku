{{- if .Values.postgresql.enabled -}}
{{- $name := include "daikoku.postgresql.fullname" . -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "daikoku.postgresql.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Single source of truth: read by the Postgres StatefulSet (POSTGRES_PASSWORD)
  # AND by Daikoku (DAIKOKU_POSTGRES_PASSWORD) — they can never drift apart.
  postgres-password: {{ include "daikoku.resolveSecret" (dict "ctx" $ "secret" $name "key" "postgres-password" "provided" .Values.postgresql.auth.password "length" 24) | quote }}
{{- end }}
