{{- if not .Values.secrets.existingSecret -}}
{{- $name := include "daikoku.secretName" . -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "daikoku.labels" . | nindent 4 }}
type: Opaque
stringData:
  PLAY_CRYPTO_SECRET: {{ include "daikoku.resolveSecret" (dict "ctx" $ "secret" $name "key" "PLAY_CRYPTO_SECRET" "provided" .Values.secrets.playCryptoSecret "length" 64) | quote }}
  DAIKOKU_SIGNING_KEY: {{ include "daikoku.resolveSecret" (dict "ctx" $ "secret" $name "key" "DAIKOKU_SIGNING_KEY" "provided" .Values.secrets.signingKey "length" 64) | quote }}
  DAIKOKU_CYPHER_SECRET: {{ include "daikoku.resolveSecret" (dict "ctx" $ "secret" $name "key" "DAIKOKU_CYPHER_SECRET" "provided" .Values.secrets.cypherSecret "length" 32) | quote }}
  DAIKOKU_INIT_ADMIN_PASSWORD: {{ include "daikoku.resolveSecret" (dict "ctx" $ "secret" $name "key" "DAIKOKU_INIT_ADMIN_PASSWORD" "provided" .Values.secrets.adminPassword "length" 24) | quote }}
  DAIKOKU_HEALTH_ACCESS_KEY: {{ include "daikoku.resolveSecret" (dict "ctx" $ "secret" $name "key" "DAIKOKU_HEALTH_ACCESS_KEY" "provided" .Values.secrets.healthAccessKey "length" 32) | quote }}
{{- end }}
