include "base.conf"

daikoku {
  mode = "test"
  signingKey = "secret"
  storage = "postgres"

  deletion {
    interval = 2 seconds
  }

  health {
    accessKey = "secret"
  }

  otoroshi {
    sync {
      cron = true
    }
  }

  postgres {
    database = "daikoku_test"
    poolSize = 4
  }


  tenants {
    provider = "hostname"
  }
}
