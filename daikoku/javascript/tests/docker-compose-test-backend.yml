version: "3"
services:
  postgres:
    container_name: daikoku-backend-test-postgres
    image: postgres:latest
    command: -c 'max_connections=500'
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_DB=daikoku_test
    volumes:
      - ./config/postgres/create_database.sql:/docker-entrypoint-initdb.d/create_database.sql
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-U", "postgres", "-d", "daikoku_test"]
      interval: 5s
      timeout: 60s
      retries: 10
      start_period: 80s

