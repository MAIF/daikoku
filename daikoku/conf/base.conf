daikoku {

  mode = "prod"
  mode = ${?DAIKOKU_MODE}
  signingKey = "secret"
  signingKey = ${?DAIKOKU_SIGNING_KEY}

  cypherSecret = "cypherSecret"
  cypherSecret = ${?DAIKOKU_CYPHER_SECRET}

  exposedOn = ${http.port}
  exposedOn = ${?DAIKOKU_EXPOSED_ON}

  storage = "postgres"
  storage = ${?DAIKOKU_STORAGE}
  containerized = false
  containerized = ${?IS_CONTAINERIZED}

  ssl.enabled = ${?DAIKOKU_SSL_ENABLED}

  health {
    accessKey = ${?DAIKOKU_HEALTH_ACCESS_KEY}
  }

  anonymous-reporting {
      enabled = true
      enabled = ${?DAIKOKU_ANONYMOUS_REPORTING_ENABLED}
      url = "https://reporting.otoroshi.io/daikoku/ingest"
      timeout = 60000
      timeout = ${?DAIKOKU_ANONYMOUS_REPORTING_TIMEOUT}
  }

  postgres {
      host = "localhost"
      host = ${?DAIKOKU_POSTGRES_HOST}
      host = ${?POSTGRESQL_ADDON_HOST}
      schema = "public"
      schema = ${?DAIKOKU_POSTGRES_SCHEMA}
      database = "default"
      database = ${?DAIKOKU_POSTGRES_DATABASE}
      database = ${?POSTGRESQL_ADDON_DB}
      username = "postgres"
      username = ${?DAIKOKU_POSTGRES_USERNAME}
      username = ${?POSTGRESQL_ADDON_USER}
      password = "postgres"
      password = ${?DAIKOKU_POSTGRES_PASSWORD}
      password = ${?POSTGRESQL_ADDON_PASSWORD}
      port = 5432
      port = ${?DAIKOKU_POSTGRES_PORT}
      port = ${?POSTGRESQL_ADDON_PORT}
      poolSize = 30
      poolSize = ${?DAIKOKU_POSTGRES_POOLSIZE}
      ssl {
        enabled = false
        enabled = ${?DAIKOKU_POSTGRES_SSL_ENABLED}
        mode = "verify-ca"
        mode = ${?DAIKOKU_POSTGRES_SSL_MODE}
        trusted-certs-path = []
        trusted-certs = []
        trusted-cert-path = ${?DAIKOKU_POSTGRES_SSL_TRUSTED_CERT_PATH}
        trusted-cert = ${?DAIKOKU_POSTGRES_SSL_TRUSTED_CERT}
        client-certs-path = []
        client-certs = []
        client-keys-path = []
        client-cert-path = ${?DAIKOKU_POSTGRES_SSL_CLIENT_CERT_PATH}
        client-cert = ${?DAIKOKU_POSTGRES_SSL_CLIENT_CERT}
        trust-all = ${?DAIKOKU_POSTGRES_SSL_TRUST_ALL}
      }
  }

  api {
    type = "local"
    type = ${?DAIKOKU_API_TYPE}
    key = "secret"
    key = ${?DAIKOKU_API_KEY}
    headerName = "Otoroshi-Claim"
    headerName = ${?DAIKOKU_API_HEADERNAME}
    headerSecret = "secret"
    headerSecret = ${?DAIKOKU_API_HEADERSECRET}
  }

  init {
    host = "localhost"
    host = ${?DAIKOKU_INIT_HOST}
    admin {
      name = "Daikoku admin"
      name = ${?DAIKOKU_INIT_ADMIN_NAME}
      email = "admin@daikoku.io"
      email = ${?DAIKOKU_INIT_ADMIN_EMAIL}
      password = ${?DAIKOKU_INIT_ADMIN_PASSWORD}
    }
    data {
      from = ${?DAIKOKU_INIT_DATA_FROM}
      headers = {}
    }

    # -------------------------------------------------------------------------
    # Optional seeding of the DEFAULT tenant. Everything below is read ONLY on
    # the very first boot, when the database is empty (same lifecycle as
    # init.data.from). Once the tenant exists the database is authoritative and
    # changing these variables has no effect.
    # -------------------------------------------------------------------------
    tenant {
      name = ${?DAIKOKU_INIT_TENANT_NAME}
      title = ${?DAIKOKU_INIT_TENANT_TITLE}
      defaultLanguage = ${?DAIKOKU_INIT_TENANT_DEFAULT_LANGUAGE}
      defaultMessage = ${?DAIKOKU_INIT_TENANT_DEFAULT_MESSAGE}
      isPrivate = ${?DAIKOKU_INIT_TENANT_IS_PRIVATE}
      creationSecurity = ${?DAIKOKU_INIT_TENANT_CREATION_SECURITY}
      teamCreationSecurity = ${?DAIKOKU_INIT_TENANT_TEAM_CREATION_SECURITY}
      subscriptionSecurity = ${?DAIKOKU_INIT_TENANT_SUBSCRIPTION_SECURITY}
      aggregationApiKeysSecurity = ${?DAIKOKU_INIT_TENANT_AGGREGATION_APIKEYS_SECURITY}
    }

    # Otoroshi instance attached to the default tenant (set url to enable).
    otoroshi {
      url = ${?DAIKOKU_INIT_OTOROSHI_URL}
      host = ${?DAIKOKU_INIT_OTOROSHI_HOST}
      clientId = ${?DAIKOKU_INIT_OTOROSHI_CLIENT_ID}
      clientSecret = ${?DAIKOKU_INIT_OTOROSHI_CLIENT_SECRET}
    }

    # S3 bucket for tenant asset storage (set bucket to enable).
    s3 {
      bucket = ${?DAIKOKU_INIT_S3_BUCKET}
      endpoint = ${?DAIKOKU_INIT_S3_ENDPOINT}
      region = ${?DAIKOKU_INIT_S3_REGION}
      access = ${?DAIKOKU_INIT_S3_ACCESS}
      secret = ${?DAIKOKU_INIT_S3_SECRET}
      chunkSize = ${?DAIKOKU_INIT_S3_CHUNK_SIZE}
      v4auth = ${?DAIKOKU_INIT_S3_V4AUTH}
    }

    # Mailer for the default tenant (defaults to console when type is unset).
    # type: console | mailgun | mailjet | smtpClient | sendgrid
    mailer {
      type = ${?DAIKOKU_INIT_MAILER_TYPE}
      fromTitle = ${?DAIKOKU_INIT_MAILER_FROM_TITLE}
      fromEmail = ${?DAIKOKU_INIT_MAILER_FROM_EMAIL}
      domain = ${?DAIKOKU_INIT_MAILER_DOMAIN}          # mailgun
      eu = ${?DAIKOKU_INIT_MAILER_EU}                  # mailgun
      key = ${?DAIKOKU_INIT_MAILER_KEY}                # mailgun
      apiKeyPublic = ${?DAIKOKU_INIT_MAILER_API_KEY_PUBLIC}    # mailjet
      apiKeyPrivate = ${?DAIKOKU_INIT_MAILER_API_KEY_PRIVATE}  # mailjet
      host = ${?DAIKOKU_INIT_MAILER_HOST}              # smtpClient
      port = ${?DAIKOKU_INIT_MAILER_PORT}              # smtpClient
      username = ${?DAIKOKU_INIT_MAILER_USERNAME}      # smtpClient
      password = ${?DAIKOKU_INIT_MAILER_PASSWORD}      # smtpClient
      sendgridApiKey = ${?DAIKOKU_INIT_MAILER_SENDGRID_APIKEY} # sendgrid
    }

    # Default tenant authentication module.
    # default: Local | Otoroshi | LDAP | OAuth2
    authProvider {
      default = ${?DAIKOKU_INIT_AUTH_PROVIDER}
      oauth2 {
        client-id = ${?DAIKOKU_INIT_AUTH_OAUTH2_CLIENT_ID}
        client-secret = ${?DAIKOKU_INIT_AUTH_OAUTH2_CLIENT_SECRET}
        token-url = ${?DAIKOKU_INIT_AUTH_OAUTH2_TOKEN_URL}
        authorized-url = ${?DAIKOKU_INIT_AUTH_OAUTH2_AUTHORIZE_URL}
        user-info-url = ${?DAIKOKU_INIT_AUTH_OAUTH2_USERINFO_URL}
        login-url = ${?DAIKOKU_INIT_AUTH_OAUTH2_LOGIN_URL}
        logout-url = ${?DAIKOKU_INIT_AUTH_OAUTH2_LOGOUT_URL}
        callback-url = ${?DAIKOKU_INIT_AUTH_OAUTH2_CALLBACK_URL}
        scope = ${?DAIKOKU_INIT_AUTH_OAUTH2_SCOPE}
        name-field = ${?DAIKOKU_INIT_AUTH_OAUTH2_NAME_FIELD}
        email-field = ${?DAIKOKU_INIT_AUTH_OAUTH2_EMAIL_FIELD}
        picture-field = ${?DAIKOKU_INIT_AUTH_OAUTH2_PICTURE_FIELD}
        role-claim = ${?DAIKOKU_INIT_AUTH_OAUTH2_ROLE_CLAIM}
        admin-role = ${?DAIKOKU_INIT_AUTH_OAUTH2_ADMIN_ROLE}
        user-role = ${?DAIKOKU_INIT_AUTH_OAUTH2_USER_ROLE}
      }
      ldap {
        server-urls = ${?DAIKOKU_INIT_AUTH_LDAP_SERVER_URLS}   # comma separated
        search-base = ${?DAIKOKU_INIT_AUTH_LDAP_SEARCH_BASE}
        user-base = ${?DAIKOKU_INIT_AUTH_LDAP_USER_BASE}
        search-filter = ${?DAIKOKU_INIT_AUTH_LDAP_SEARCH_FILTER}
        admin-username = ${?DAIKOKU_INIT_AUTH_LDAP_ADMIN_USERNAME}
        admin-password = ${?DAIKOKU_INIT_AUTH_LDAP_ADMIN_PASSWORD}
        name-fields = ${?DAIKOKU_INIT_AUTH_LDAP_NAME_FIELDS}   # comma separated
        email-field = ${?DAIKOKU_INIT_AUTH_LDAP_EMAIL_FIELD}
        group-filter = ${?DAIKOKU_INIT_AUTH_LDAP_GROUP_FILTER}
        admin-group-filter = ${?DAIKOKU_INIT_AUTH_LDAP_ADMIN_GROUP_FILTER}
        use-ssl = ${?DAIKOKU_INIT_AUTH_LDAP_USE_SSL}
      }
    }

    # Audit trail destinations for the default tenant (optional).
    audit {
      alertsEmails = ${?DAIKOKU_INIT_AUDIT_ALERTS_EMAILS}      # comma separated
      elastic {
        clusterUri = ${?DAIKOKU_INIT_AUDIT_ELASTIC_CLUSTER_URI}
        index = ${?DAIKOKU_INIT_AUDIT_ELASTIC_INDEX}
        type = ${?DAIKOKU_INIT_AUDIT_ELASTIC_TYPE}
        user = ${?DAIKOKU_INIT_AUDIT_ELASTIC_USER}
        password = ${?DAIKOKU_INIT_AUDIT_ELASTIC_PASSWORD}
      }
    }
  }

  snowflake {
    seed = 0
    seed = ${?INSTANCE_NUMBER}
  }

  tenants {
    provider = "local" # can be local, header, hostname
    provider = ${?DAIKOKU_TENANT_PROVIDER}
    hostheaderName = "Otoroshi-Proxied-Host"
    hostheaderName = ${?DAIKOKU_TENANT_HOST_HEADERNAME}
  }

  teams {
    defaultApiKeyVisibility = "user" # can be admin, user
    defaultApiKeyVisibility = ${?DAIKOKU_TEAM_DEFAULT_APIKEY_VISIBILITY}
  }

  exposition {
    provider = "none"
    provider = ${?DAIKOKU_EXPOSITION_PROVIDER}
    otoroshi {
      stateHeaderName = "Otoroshi-State"
      stateHeaderName = ${?DAIKOKU_EXPOSITION_OTOROSHI_STATE_HEADER_NAME}
      stateRespHeaderName = "Otoroshi-State-Resp"
      stateRespHeaderName = ${?DAIKOKU_EXPOSITION_OTOROSHI_STATE_RESP_HEADER_NAME}
    }
  }

  otoroshi {
    groups {
      namePrefix = ${?DAIKOKU_OTOROSHI_GROUPS_NAME_PREFIX}
      idPrefix = ${?DAIKOKU_OTOROSHI_GROUPS_ID_PREFIX}
    }
    sync {
      interval = 3600000
      interval = ${?DAIKOKU_OTOROSHI_SYNC_INTERVAL}
      mode = "interval"
      mode = ${?DAIKOKU_OTOROSHI_SYNC_MODE}
      master = false
      master = ${?DAIKOKU_OTOROSHI_SYNC_MASTER}
      key = "secret"
      key = ${?DAIKOKU_OTOROSHI_SYNC_KEY}
      cron = false
      cron = ${?DAIKOKU_OTOROSHI_SYNC_CRON}
      instance = ${?INSTANCE_NUMBER}
      cronExpression = ${?DAIKOKU_OTOROSHI_SYNC_CRON_EXPRESSION}
    }
  }

  stats {
    sync {
      interval = 3600000
      cron = false
      cron = ${?DAIKOKU_OTOROSHI_SYNC_CRON}
    }
    call {
      interval = 600000
    }
  }

  rotationJob {
    enabled = false
    enabled = ${?DAIKOKU_ROTATION_JOB_ENABLED}
    mode = "interval"
    mode = ${?DAIKOKU_ROTATION_JOB_MODE}
    key = "secret"
    key = ${?DAIKOKU_ROTATION_JOB_ACCESS_KEY}
    cronExpression = ${?DAIKOKU_ROTATION_JOB_CRON_EXPRESSION}
    interval =${?DAIKOKU_ROTATION_JOB_INTERVAL}
  }

  verifierJob {
    enabled = false
    enabled = ${?DAIKOKU_VERIFIER_JOB_ENABLED}
    mode = "interval"
    mode = ${?DAIKOKU_VERIFIER_JOB_MODE}
    key = "secret"
    key = ${?DAIKOKU_VERIFIER_JOB_ACCESS_KEY}
    cronExpression = ${?DAIKOKU_VERIFIER_JOB_CRON_EXPRESSION}
    interval =${?DAIKOKU_VERIFIER_JOB_INTERVAL}
  }

  remoteCatalog {
    enabled = false
    enabled = ${?DAIKOKU_REMOTE_CATALOG_ENABLED}
    interval = 60000
    interval = ${?DAIKOKU_REMOTE_CATALOG_INTERVAL}
  }

  audit {
    purge {
      cron = false
      cron = ${?DAIKOKU_AUDIT_PURGE_CRON}
      interval = 1hour
      interval = ${?DAIKOKU_AUDIT_PURGE_INTERVAL}
      max.date = 60days
      max.date = ${?DAIKOKU_AUDIT_PURGE_MAX_DATE}
    }
  }

  notifications {
    purge {
      cron = true
      cron = ${?DAIKOKU_NOTIFICATIONS_PURGE_CRON}
      interval = 1hour
      interval = ${?DAIKOKU_NOTIFICATIONS_PURGE_INTERVAL}
      max.to.treat.date = 180days
      max.to.treat.date = ${?DAIKOKU_NOTIFICATIONS_PURGE_MAX_DATE}
      max.base.date = 30days
      max.base.date = ${?DAIKOKU_NOTIFICATIONS_PURGE_MAX_DATE}
    }
  }


}

mongodb {
  uri = "mongodb://localhost:27017/daikoku"
  uri = ${?MONGODB_URI}
  uri = ${?MONGODB_ADDON_URI}
}

http.port = 8080
http.port = ${?PORT}
https.port = ${?HTTPS_PORT}
http2.enabled = no
play {
  application.loader = "fr.maif.daikoku.DaikokuApplicationLoader"
  i18n.langs=[ "en" , "fr" ]
  modules {}
  filters {
    enabled = []
  }
  http {
    filters = play.api.http.NoHttpFilters
    parser = {
      maxMemoryBuffer=2MB
    }
    secret {
      key = "snTgnSr806O%yII^mIYn@m!c8q#nVTdv9go%5swCyw4$!wxDqU41gI&iCb^HPMY2"
      key = ${?PLAY_CRYPTO_SECRET}
    }
    session = {
      cookieName = "daikoku-session"
      cookieName = ${?DAIKOKU_SESSION_NAME}
      secure = false
      secure = ${?DAIKOKU_SESSION_SECURE}
      maxAge = 259200000
      maxAge = ${?DAIKOKU_SESSION_MAXAGE}
      httpOnly = true
      httpOnly = ${?DAIKOKU_SESSION_HTTPONLY}
      sameSite = "lax"
      sameSite = ${?DAIKOKU_SESSION_SAMESITE}
      domain = null
      domain = ${?DAIKOKU_SESSION_DOMAIN}
      path = ${play.http.context}
      jwt {
        signatureAlgorithm = "HS256"
        expiresAfter = ${play.http.session.maxAge}
        clockSkew = 5 minutes
        dataClaim = "data"
      }
    }
  }
  server {
    pekko {
      requestTimeout = 60s
    }
    http {
      port = ${http.port}
      idleTimeout = 60s
    }
    https {
      port = ${?HTTPS_PORT}
      keyStore {
        path=${?HTTPS_KEYSTORE_PATH}
        type=${?HTTPS_KEYSTORE_TYPE}
        password=${?HTTPS_KEYSTORE_PASSWORD}
        algorithm=${?HTTPS_KEYSTORE_ALGO}
      }
    }
  }
}
http2.enabled = ${?HTTP2_ENABLED}

